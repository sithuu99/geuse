<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geuse — Session</title>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('geuse-theme') || 'light');</script>
  <link rel="stylesheet" href="../styles/global.css" />
  <style>
    .logo-text { font-family: var(--font-serif); font-size: 1.15rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); user-select: none; }
    .logo-text .s { color: var(--accent); }

    body { overflow: hidden; }

    /* ── Loading overlay ──────────────────────────────────────── */
    #loadingView {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: .75rem;
      color: var(--text-muted);
      font-size: .9rem;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border-md);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      transition: none;
    }

    /* ── Exercise panel (left) ────────────────────────────────── */
    .ex-panel {
      display: flex;
      flex-direction: column;
      padding: 2rem 2.25rem;
      border-right: 1px solid var(--border);
      background: var(--bg);
      overflow-y: auto;
      gap: 1.25rem;
    }

    .ex-progress-row {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .ex-name-block h2 {
      font-size: 1.4rem;
      margin-bottom: .25rem;
    }

    .ex-desc {
      font-size: .85rem;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 40ch;
    }

    /* ── Tracker card ─────────────────────────────────────────── */
    .tracker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .big-num {
      font-family: var(--font-serif);
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      transition: color 0.2s ease;
    }

    .big-num.active { color: var(--green); }

    .big-num-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-hint);
    }

    .hold-timers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .hold-stat {
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }

    .prog-bar-wrap {
      height: 6px;
      background: var(--border-md);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .prog-bar-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--accent);
      transition: width 0.1s ease, background-color 0.3s ease;
      width: 0%;
    }

    .prog-bar-fill.green { background: var(--green); }

    .zone-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .82rem;
      color: var(--text-hint);
    }

    .zone-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-md);
      flex-shrink: 0;
      transition: background-color 0.2s ease;
    }

    .zone-dot.active {
      background: var(--green);
      animation: status-pulse-green 1.2s ease-in-out infinite;
    }

    .rep-dots {
      display: flex;
      gap: .35rem;
      flex-wrap: wrap;
    }

    .rep-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1.5px solid var(--border-md);
      background: var(--surface-muted);
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .rep-dot.done {
      background: var(--green);
      border-color: var(--green);
    }

    .set-dots {
      display: flex;
      gap: .4rem;
      align-items: center;
    }

    .set-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border-md);
      transition: background-color 0.3s ease, width 0.3s var(--ease-spring);
    }

    .set-dot.done   { background: var(--green); }
    .set-dot.active { background: var(--accent); width: 18px; border-radius: var(--radius-full); }

    /* ── Rest view ────────────────────────────────────────────── */
    .rest-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: .75rem;
      text-align: center;
    }

    .rest-timer-num {
      font-family: var(--font-serif);
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
    }

    .rest-subtitle {
      font-size: .82rem;
      color: var(--text-hint);
    }

    /* ── Camera panel (right) ─────────────────────────────────── */
    .cam-panel {
      display: flex;
      flex-direction: column;
      padding: 1.5rem 2rem;
      background: var(--surface-muted);
      gap: .75rem;
      overflow: hidden;
    }

    .cam-panel .camera-wrap {
      flex: 1;
      min-height: 0;
    }

    .closure-bar-row {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .closure-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-hint);
      white-space: nowrap;
    }

    .closure-bar-wrap {
      flex: 1;
      height: 8px;
      background: var(--border-md);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .closure-bar-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--accent);
      transition: width 0.08s ease;
      width: 0%;
    }

    .closure-value {
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 2.8rem;
      text-align: right;
    }

    /* ── Complete view ────────────────────────────────────────── */
    #completeView {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem;
      gap: 1.5rem;
      overflow-y: auto;
    }

    .complete-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--green-subtle);
      border: 2px solid var(--green-subtle-2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green);
    }

    .complete-stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .complete-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .2rem;
      padding: .75rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      min-width: 7rem;
    }

    .complete-stat-val {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
    }

    .complete-stat-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-hint);
    }

    .pain-after-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      width: 100%;
      max-width: 420px;
    }

    .pain-mini-num {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .pain-mini-num.level-low  { color: var(--green);   }
    .pain-mini-num.level-mid  { color: var(--warning);  }
    .pain-mini-num.level-high { color: var(--danger);   }

    .complete-actions {
      display: flex;
      gap: .75rem;
      width: 100%;
      max-width: 420px;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <header class="topbar">
    <div>
      <span class="logo-text">geu<span class="s">s</span>e</span>
    </div>
    <div id="topbarCenter" style="font-size:.82rem; font-weight:600; color:var(--text-hint);"></div>
    <div class="topbar-right">
      <button class="theme-toggle" onclick="api.navigate('progress')" aria-label="Progress" title="Progress"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></button>
      <button class="theme-toggle" onclick="api.navigate('settings')" aria-label="Settings" title="Settings"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle light / dark"></button>
    </div>
  </header>

  <!-- Loading -->
  <div id="loadingView">
    <div class="spinner"></div>
    Loading your plan…
  </div>

  <!-- Session: split layout -->
  <div id="sessionView" class="split-layout" style="display:none;">
    <div class="ex-panel" id="exercisePanel"><!-- injected --></div>

    <div class="cam-panel">
      <div class="camera-wrap">
        <img id="camFeed" class="camera-feed" src="" alt="Camera feed" />
        <div class="cam-corner cam-corner-tl"></div>
        <div class="cam-corner cam-corner-tr"></div>
        <div class="cam-corner cam-corner-bl"></div>
        <div class="cam-corner cam-corner-br"></div>
        <div class="scan-line"></div>
      </div>
      <div class="closure-bar-row">
        <span class="closure-label">Closure</span>
        <div class="closure-bar-wrap">
          <div class="closure-bar-fill" id="closureBarFill"></div>
        </div>
        <span class="closure-value" id="closureVal">—</span>
      </div>
      <div id="camStatusPill" class="status-pill searching">
        <div class="status-pill-dot"></div>
        <span id="camStatusText">Searching…</span>
      </div>
    </div>
  </div>

  <!-- Complete -->
  <div id="completeView" style="display:none;">
    <div class="complete-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div style="text-align:center;">
      <h2 style="margin-bottom:.3rem;">Session complete</h2>
      <p class="text-muted text-sm">Great work. Here's how you did.</p>
    </div>
    <div class="complete-stats" id="completeStats"></div>

    <div class="pain-after-card">
      <p class="text-hint text-xs font-semibold"
        style="text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem;">
        Pain level now
      </p>
      <div style="display:flex;align-items:baseline;gap:.75rem;margin-bottom:1rem;">
        <span class="pain-mini-num level-low" id="painAfterNum">0</span>
        <span class="text-hint text-sm" id="painAfterDesc">No pain</span>
      </div>
      <input type="range" id="painAfterSlider" min="0" max="10" value="0" step="1"
        aria-label="Pain level after session" />
    </div>

    <div class="complete-actions">
      <button class="btn btn-primary flex-1" id="btnDone">Done</button>
    </div>
  </div>

</div><!-- /.app-shell -->


<script>
  /* ── Theme toggle ─────────────────────────────────────────────── */
  const html        = document.documentElement;
  const themeToggle = document.getElementById("themeToggle");

  const SUN_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <line x1="12" y1="2"  x2="12" y2="5"/>
    <line x1="12" y1="19" x2="12" y2="22"/>
    <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
    <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
    <line x1="2"  y1="12" x2="5"  y2="12"/>
    <line x1="19" y1="12" x2="22" y2="12"/>
    <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
    <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
  </svg>`;

  const MOON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>`;

  function applyTheme(theme) {
    html.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
    const isDark = theme === "dark";
    themeToggle.innerHTML = isDark ? SUN_SVG : MOON_SVG;
    themeToggle.title = isDark ? "Switch to light mode" : "Switch to dark mode";
  }

  applyTheme(localStorage.getItem("geuse-theme") || "light");
  themeToggle.addEventListener("click", () => {
    const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
    localStorage.setItem("geuse-theme", next);
    applyTheme(next);
  });
</script>

<script>
/* ================================================================
   Session controller
   ================================================================ */

const POLL_MS      = 33;   // ~30 fps
const GRACE_FRAMES = 6;    // frames out-of-zone before resetting hold timer

/* ── DOM refs ─────────────────────────────────────────────────── */
const loadingView   = document.getElementById("loadingView");
const sessionView   = document.getElementById("sessionView");
const completeView  = document.getElementById("completeView");
const exercisePanel = document.getElementById("exercisePanel");
const topbarCenter  = document.getElementById("topbarCenter");
const camFeed       = document.getElementById("camFeed");
const closureBarFill= document.getElementById("closureBarFill");
const closureVal    = document.getElementById("closureVal");
const camStatusPill = document.getElementById("camStatusPill");
const camStatusText = document.getElementById("camStatusText");

/* ── Session state ────────────────────────────────────────────── */
let exercises    = [];
let planId       = null;
let painBefore   = parseInt(localStorage.getItem("geuse-pain-before") || "0", 10);
let sessionStart = Date.now();
let sessionLog   = [];   // filled as exercises complete

let exerciseIdx  = 0;
let setIdx       = 0;
let repsDone     = 0;

// Hold-type state
let holdSeconds  = 0;
let bestHold     = 0;
let holdActive   = false;
let holdComplete = false;  // true after hold counted, wait for out-of-zone
let graceCount   = 0;
let lastFrameMs  = performance.now();

// Reps-type state
let prevInZone   = false;

// Rest state
let restIntervalId  = null;
let restSecondsLeft = 0;
let restTotalS      = 0;

// 'exercise' | 'rest' | 'done'
let state = "exercise";

/* ── Helpers ──────────────────────────────────────────────────── */
function currentEx() { return exercises[exerciseIdx]; }

function inTargetZone(ex, closure, label) {
  if (ex.tracking_type === "hold") {
    if (closure === null) return false;
    return closure >= ex.target_closure_min && closure <= ex.target_closure_max;
  }
  // reps-type: class-based or closure-based
  if (ex.target_closure_min !== null && ex.target_closure_min !== undefined) {
    return closure !== null && closure >= ex.target_closure_min;
  }
  return label === ex.target_class;
}

function repDotsHTML(reps, done) {
  return Array.from({ length: reps }, (_, i) =>
    `<div class="rep-dot${i < done ? " done" : ""}"></div>`
  ).join("");
}

function setDotsHTML(sets, current) {
  return Array.from({ length: sets }, (_, i) => {
    const cls = i < current ? "done" : i === current ? "active" : "";
    return `<div class="set-dot${cls ? " " + cls : ""}"></div>`;
  }).join("");
}

/* ── Render exercise panel ────────────────────────────────────── */
function renderExercisePanel() {
  const ex     = currentEx();
  const exNum  = exerciseIdx + 1;
  const exTotal= exercises.length;
  const setNum = setIdx + 1;

  topbarCenter.textContent = `Exercise ${exNum} of ${exTotal}`;

  if (ex.tracking_type === "hold") {
    exercisePanel.innerHTML = `
      <div class="ex-progress-row">
        <span class="badge badge-neutral">Exercise ${exNum} / ${exTotal}</span>
        <span class="badge badge-accent">Set ${setNum} / ${ex.sets}</span>
      </div>
      <div class="ex-name-block">
        <h2>${ex.name}</h2>
        <p class="ex-desc">${ex.description || ""}</p>
      </div>
      <div class="tracker-card">
        <div class="hold-timers">
          <div class="hold-stat">
            <span class="big-num-label">Current hold</span>
            <span class="big-num" id="currentHoldNum">0.0s</span>
          </div>
          <div class="hold-stat">
            <span class="big-num-label">Best hold</span>
            <span class="big-num" id="bestHoldNum">0.0s</span>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;margin-bottom:.4rem;">
            <span class="text-hint text-xs" style="font-weight:600;letter-spacing:.06em;text-transform:uppercase;">Hold progress</span>
            <span class="text-hint text-xs">Target: ${ex.hold_s}s</span>
          </div>
          <div class="prog-bar-wrap">
            <div class="prog-bar-fill" id="holdProgFill"></div>
          </div>
        </div>
        <div class="zone-row">
          <div class="zone-dot" id="zoneDot"></div>
          <span id="zoneText">Position your hand in range</span>
        </div>
      </div>
      <div>
        <span class="text-hint text-xs font-semibold" style="text-transform:uppercase;letter-spacing:.06em;">
          Holds this set — ${repsDone} / ${ex.reps}
        </span>
        <div class="rep-dots mt-2" id="repDots">${repDotsHTML(ex.reps, repsDone)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <span class="text-hint text-xs">Sets</span>
        <div class="set-dots">${setDotsHTML(ex.sets, setIdx)}</div>
      </div>
    `;
  } else {
    const isClassBased = (ex.target_closure_min === null || ex.target_closure_min === undefined);
    exercisePanel.innerHTML = `
      <div class="ex-progress-row">
        <span class="badge badge-neutral">Exercise ${exNum} / ${exTotal}</span>
        <span class="badge badge-accent">Set ${setNum} / ${ex.sets}</span>
      </div>
      <div class="ex-name-block">
        <h2>${ex.name}</h2>
        <p class="ex-desc">${ex.description || ""}</p>
      </div>
      <div class="tracker-card">
        <div style="display:flex;align-items:baseline;gap:.75rem;">
          <span class="big-num" id="repCountNum">${repsDone}</span>
          <span class="text-muted" style="font-size:1.2rem;font-weight:600;">/ ${ex.reps}</span>
        </div>
        <div class="prog-bar-wrap">
          <div class="prog-bar-fill green" id="repProgFill"
            style="width:${Math.round(repsDone / ex.reps * 100)}%"></div>
        </div>
        <div class="zone-row">
          <div class="zone-dot" id="zoneDot"></div>
          <span id="zoneText">${isClassBased ? "Form the gesture, then release" : "Close fully, then open"}</span>
        </div>
      </div>
      <div>
        <span class="text-hint text-xs font-semibold" style="text-transform:uppercase;letter-spacing:.06em;">
          Reps — ${repsDone} / ${ex.reps}
        </span>
        <div class="rep-dots mt-2" id="repDots">${repDotsHTML(ex.reps, repsDone)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <span class="text-hint text-xs">Sets</span>
        <div class="set-dots">${setDotsHTML(ex.sets, setIdx)}</div>
      </div>
    `;
  }
}

/* ── Render rest panel ────────────────────────────────────────── */
function renderRestPanel() {
  topbarCenter.textContent = "";

  let nextLabel = "";
  if (setIdx < currentEx().sets) {
    nextLabel = `Next: set ${setIdx + 1} of ${currentEx().sets}`;
  } else {
    const nextEx = exercises[exerciseIdx + 1];
    nextLabel = nextEx ? `Next: ${nextEx.name}` : "Final stretch!";
  }

  exercisePanel.innerHTML = `
    <div class="rest-view">
      <span class="text-hint text-xs font-semibold" style="text-transform:uppercase;letter-spacing:.08em;">Rest</span>
      <div class="rest-timer-num" id="restTimerNum">${restSecondsLeft}s</div>
      <div style="width:100%;max-width:240px;">
        <div class="prog-bar-wrap" style="height:4px;">
          <div class="prog-bar-fill" id="restProgFill" style="width:100%;"></div>
        </div>
      </div>
      <p class="rest-subtitle">${nextLabel}</p>
      <button class="btn btn-ghost btn-sm mt-3" id="btnSkipRest">Skip rest</button>
    </div>
  `;

  document.getElementById("btnSkipRest").addEventListener("click", endRest);
}

/* ── Hold frame processing ────────────────────────────────────── */
function processHoldFrame(ex, inZone, dt) {
  const elCurrent  = document.getElementById("currentHoldNum");
  const elBest     = document.getElementById("bestHoldNum");
  const elFill     = document.getElementById("holdProgFill");
  const elDot      = document.getElementById("zoneDot");
  const elText     = document.getElementById("zoneText");
  if (!elCurrent) return;

  if (holdComplete) {
    // Held long enough — wait for release before counting next hold
    if (!inZone) {
      holdComplete = false;
      holdSeconds  = 0;
      graceCount   = 0;
    }
    elCurrent.textContent = "0.0s";
    elDot.classList.remove("active");
    elText.textContent = "Release and reposition";
    return;
  }

  if (inZone) {
    graceCount   = 0;
    holdActive   = true;
    holdSeconds += dt;

    const pct = Math.min(100, holdSeconds / ex.hold_s * 100);
    elFill.style.width    = pct + "%";
    elCurrent.textContent = holdSeconds.toFixed(1) + "s";
    elCurrent.classList.add("active");
    elDot.classList.add("active");
    elText.textContent = holdSeconds >= ex.hold_s
      ? "Hold complete — release now"
      : `Hold… ${(ex.hold_s - holdSeconds).toFixed(1)}s to go`;

    if (holdSeconds > bestHold) {
      bestHold = holdSeconds;
      if (elBest) elBest.textContent = bestHold.toFixed(1) + "s";
    }

    if (holdSeconds >= ex.hold_s) {
      holdComplete = true;
      countRep();
    }
  } else {
    graceCount++;
    if (graceCount >= GRACE_FRAMES) {
      holdActive    = false;
      holdSeconds   = 0;
      elFill.style.width    = "0%";
      elCurrent.textContent = "0.0s";
      elCurrent.classList.remove("active");
    }
    elDot.classList.remove("active");
    elText.textContent = "Get into position";
  }
}

/* ── Rep frame processing ─────────────────────────────────────── */
function processRepFrame(ex, inZone) {
  const elCount = document.getElementById("repCountNum");
  const elFill  = document.getElementById("repProgFill");
  const elDot   = document.getElementById("zoneDot");
  const elText  = document.getElementById("zoneText");
  if (!elCount) return;

  // Count on leading edge: not-in-zone → in-zone
  if (inZone && !prevInZone) {
    countRep();
  }
  prevInZone = inZone;

  elDot.classList.toggle("active", inZone);
  if (inZone) {
    elText.textContent = "Target reached!";
  } else {
    const isClassBased = (ex.target_closure_min === null || ex.target_closure_min === undefined);
    elText.textContent = isClassBased
      ? `Form the ${ex.name.toLowerCase()} gesture`
      : "Close your hand to the target";
  }

  elCount.textContent = repsDone;
  if (elFill) elFill.style.width = Math.round(repsDone / ex.reps * 100) + "%";
}

/* ── Count a rep / completed hold ────────────────────────────── */
function countRep() {
  repsDone++;
  const dots = document.querySelectorAll(".rep-dot");
  if (dots[repsDone - 1]) dots[repsDone - 1].classList.add("done");
  if (repsDone >= currentEx().reps) {
    setTimeout(completeSet, 500);
  }
}

/* ── Complete a set ───────────────────────────────────────────── */
function completeSet() {
  const ex = currentEx();

  if (!sessionLog[exerciseIdx]) {
    sessionLog[exerciseIdx] = { id: ex.id, name: ex.name, sets_completed: 0, reps_per_set: [] };
  }
  sessionLog[exerciseIdx].reps_per_set.push(repsDone);
  sessionLog[exerciseIdx].sets_completed++;

  setIdx++;
  repsDone     = 0;
  holdSeconds  = 0;
  bestHold     = 0;
  holdComplete = false;
  prevInZone   = false;

  if (setIdx >= ex.sets) {
    exerciseIdx++;
    setIdx = 0;
    if (exerciseIdx >= exercises.length) {
      endSession();
    } else {
      beginExercise();
    }
    return;
  }

  beginRest(ex.rest_s);
}

/* ── Begin exercise ───────────────────────────────────────────── */
function beginExercise() {
  state        = "exercise";
  repsDone     = 0;
  holdSeconds  = 0;
  bestHold     = 0;
  holdComplete = false;
  prevInZone   = false;
  graceCount   = 0;
  renderExercisePanel();
}

/* ── Rest ─────────────────────────────────────────────────────── */
function beginRest(seconds) {
  state           = "rest";
  restSecondsLeft = seconds;
  restTotalS      = seconds;
  renderRestPanel();

  restIntervalId = setInterval(() => {
    restSecondsLeft--;
    const elNum  = document.getElementById("restTimerNum");
    const elFill = document.getElementById("restProgFill");
    if (elNum)  elNum.textContent  = restSecondsLeft + "s";
    if (elFill) elFill.style.width = Math.round(restSecondsLeft / restTotalS * 100) + "%";
    if (restSecondsLeft <= 0) endRest();
  }, 1000);
}

function endRest() {
  if (restIntervalId) { clearInterval(restIntervalId); restIntervalId = null; }
  beginExercise();
}

/* ── End session ──────────────────────────────────────────────── */
function endSession() {
  state = "done";
  stopPolling();
  api.stopCamera().catch(() => {});

  sessionView.style.display  = "none";
  completeView.style.display = "flex";

  const durationS = Math.round((Date.now() - sessionStart) / 1000);
  const totalSets = sessionLog.reduce((n, e) => n + (e ? e.sets_completed : 0), 0);

  document.getElementById("completeStats").innerHTML = `
    <div class="complete-stat">
      <span class="complete-stat-val">${exercises.length}</span>
      <span class="complete-stat-label">Exercises</span>
    </div>
    <div class="complete-stat">
      <span class="complete-stat-val">${totalSets}</span>
      <span class="complete-stat-label">Sets done</span>
    </div>
    <div class="complete-stat">
      <span class="complete-stat-val">${Math.round(durationS / 60)}m</span>
      <span class="complete-stat-label">Duration</span>
    </div>
  `;
  topbarCenter.textContent = "";

  // Pain-after slider
  const paSlider = document.getElementById("painAfterSlider");
  const paNum    = document.getElementById("painAfterNum");
  const paDesc   = document.getElementById("painAfterDesc");
  const DESCS    = ["No pain","Very mild","Mild","Noticeable","Moderate",
                    "Uncomfortable","Distressing","Severe","Very severe","Intense","Unbearable"];

  function updatePainAfter(v) {
    v = parseInt(v, 10);
    paNum.textContent = v;
    paDesc.textContent = DESCS[v];
    paNum.classList.remove("level-low","level-mid","level-high");
    if      (v <= 3) paNum.classList.add("level-low");
    else if (v <= 6) paNum.classList.add("level-mid");
    else             paNum.classList.add("level-high");
  }

  paSlider.addEventListener("input", () => updatePainAfter(paSlider.value));
  updatePainAfter(0);

  document.getElementById("btnDone").addEventListener("click", async () => {
    const btn = document.getElementById("btnDone");
    btn.disabled    = true;
    btn.textContent = "Saving…";
    try {
      await api.saveSessionResult({
        exercises:   sessionLog.filter(Boolean),
        plan_id:     planId,
        pain_before: painBefore,
        pain_after:  parseInt(paSlider.value, 10),
        duration_s:  durationS,
      });
    } catch (_) { /* non-critical */ }
    api.navigate("dashboard");
  });
}

/* ── Camera polling ───────────────────────────────────────────── */
let polling    = false;
let pollHandle = null;

function schedulePoll() {
  if (!polling) return;
  pollHandle = setTimeout(doPoll, POLL_MS);
}

async function doPoll() {
  if (!polling) return;
  try {
    const result = await api.getFrame();
    const now    = performance.now();
    const dt     = Math.min((now - lastFrameMs) / 1000, 0.1);
    lastFrameMs  = now;

    if (result.ok && result.jpeg_b64) {
      camFeed.src = "data:image/jpeg;base64," + result.jpeg_b64;
      camFeed.classList.add("visible");
    }

    const closure = result.raw_closure ?? result.learned_closure ?? null;
    const label   = result.label || "";

    // Closure bar
    if (closure !== null) {
      closureBarFill.style.width = Math.round(closure * 100) + "%";
      closureVal.textContent     = closure.toFixed(2);
    } else {
      closureBarFill.style.width = "0%";
      closureVal.textContent     = "—";
    }

    // Camera status pill
    if (result.hand_detected) {
      camStatusPill.className   = "status-pill active";
      camStatusText.textContent = label || "Hand detected";
    } else {
      camStatusPill.className   = "status-pill searching";
      camStatusText.textContent = "Searching…";
    }

    // Tracking (only when in exercise state)
    if (state === "exercise") {
      const ex   = currentEx();
      const inZn = result.hand_detected && inTargetZone(ex, closure, label);
      if (ex.tracking_type === "hold") {
        processHoldFrame(ex, inZn, dt);
      } else {
        processRepFrame(ex, inZn);
      }
    }
  } catch (_) { /* swallow poll errors */ }

  schedulePoll();
}

function startPolling() {
  polling     = true;
  lastFrameMs = performance.now();
  schedulePoll();
}

function stopPolling() {
  polling = false;
  if (pollHandle) { clearTimeout(pollHandle); pollHandle = null; }
}

/* ── Boot ─────────────────────────────────────────────────────── */
async function boot() {
  try {
    const planResult = await api.getPlan();

    if (!planResult.ok || !planResult.plan || !planResult.plan.exercises?.length) {
      loadingView.innerHTML = `<p class="text-muted text-sm">
        No plan found.
        <span class="text-accent pointer" onclick="api.navigate('plan')">Generate a plan first.</span>
      </p>`;
      return;
    }

    exercises = planResult.plan.exercises;
    planId    = planResult.plan.id || null;

    loadingView.style.display = "none";
    sessionView.style.display = "grid";

    await api.startCamera();
    startPolling();
    beginExercise();
  } catch (_) {
    loadingView.innerHTML = `<p class="text-muted text-sm">Failed to load session.</p>`;
  }
}

if (window.pywebview?.api) {
  boot();
} else {
  window.addEventListener("pywebviewready", boot, { once: true });
}
</script>
