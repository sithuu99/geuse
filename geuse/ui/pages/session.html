<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geuse — Session</title>
  <link rel="stylesheet" href="../styles/global.css" />
  <style>
    .exercise-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .5rem;
    }
    .progress-bar-wrap {
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width .4s ease;
    }
    .rep-counter {
      font-size: 4rem; font-weight: 800;
      color: var(--accent); text-align: center;
      line-height: 1; margin: 1.5rem 0;
    }
    .rep-label { text-align: center; color: var(--text-muted); font-size: .9rem; margin-bottom: 1.5rem; }
    .set-dots { display: flex; gap: .5rem; justify-content: center; margin-bottom: 1.5rem; }
    .set-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      transition: background .2s;
    }
    .set-dot.done { background: var(--accent); border-color: var(--accent); }
    .camera-small {
      height: 160px; background: #111;
      border: 1px solid var(--border); border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: .85rem;
      margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav">
      <span>Geuse</span><span class="sep">›</span>
      <a href="#" onclick="confirmEnd()">Plan</a>
      <span class="sep">›</span><span class="active">Session</span>
    </nav>

    <div class="exercise-header">
      <h2 id="exName">Loading…</h2>
      <span class="muted" id="exCounter"></span>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="card mt-3">
      <div class="camera-small">Camera feed</div>

      <div class="set-dots" id="setDots"></div>

      <div class="rep-counter" id="repCount">—</div>
      <div class="rep-label"   id="repLabel">reps remaining</div>

      <div class="flex gap-2" style="justify-content:center;">
        <button class="btn btn-primary" id="btnRep">Rep Done</button>
        <button class="btn btn-ghost"   id="btnSkip">Skip Set</button>
      </div>
    </div>

    <div class="flex gap-2 mt-3">
      <button class="btn btn-ghost" id="btnEndSession">End Session</button>
    </div>
  </div>

  <script src="../js/bridge.js"></script>
  <script>
    let exercises = [];
    let exIndex   = 0;
    let setIndex  = 0;
    let repsDone  = 0;
    const results = [];

    async function init() {
      const plan = await api.getPlan();
      exercises  = (plan && plan.exercises) || [];
      if (exercises.length === 0) { api.navigate("plan"); return; }

      await api.startSession({ plan });
      renderExercise();
    }

    function renderExercise() {
      if (exIndex >= exercises.length) { finishSession(); return; }

      const ex = exercises[exIndex];
      document.getElementById("exName").textContent    = ex.name;
      document.getElementById("exCounter").textContent = `${exIndex + 1} / ${exercises.length}`;
      document.getElementById("progressFill").style.width = `${(exIndex / exercises.length) * 100}%`;

      // Set dots
      const dots = document.getElementById("setDots");
      dots.innerHTML = "";
      for (let i = 0; i < ex.sets; i++) {
        const d = document.createElement("div");
        d.className = "set-dot" + (i < setIndex ? " done" : "");
        dots.appendChild(d);
      }

      repsDone = 0;
      updateRepDisplay();
    }

    function updateRepDisplay() {
      const ex   = exercises[exIndex];
      const rem  = ex.reps - repsDone;
      document.getElementById("repCount").textContent = rem;
      document.getElementById("repLabel").textContent = rem === 1 ? "rep remaining" : "reps remaining";
    }

    document.getElementById("btnRep").addEventListener("click", () => {
      const ex = exercises[exIndex];
      repsDone++;
      updateRepDisplay();

      if (repsDone >= ex.reps) {
        setIndex++;
        results.push({ exercise: ex.id, set: setIndex, reps_completed: repsDone });

        if (setIndex >= ex.sets) {
          exIndex++; setIndex = 0;
        }
        setTimeout(renderExercise, 300);
      }
    });

    document.getElementById("btnSkip").addEventListener("click", () => {
      const ex = exercises[exIndex];
      results.push({ exercise: ex.id, set: setIndex + 1, reps_completed: repsDone, skipped: true });
      setIndex++;
      if (setIndex >= ex.sets) { exIndex++; setIndex = 0; }
      renderExercise();
    });

    document.getElementById("btnEndSession").addEventListener("click", confirmEnd);

    function confirmEnd() {
      if (confirm("End session now? Progress will be saved.")) finishSession();
    }

    async function finishSession() {
      await api.endSession({
        exercises_done: results,
        completed_at:   new Date().toISOString(),
      });
      api.navigate("plan");
    }

    init();
  </script>
</body>
</html>
