<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geuse — Profile</title>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('geuse-theme') || 'light');</script>
  <link rel="stylesheet" href="../styles/global.css" />
  <style>
    .logo-text { font-family: var(--font-serif); font-size: 1.15rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); user-select: none; }
    .logo-text .s { color: var(--accent); }
    .page { height: 100%; overflow-y: auto; }
    .field { margin-bottom: 1.2rem; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: .4rem; }
    .chip {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .35rem .8rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: .85rem;
      user-select: none;
      transition: background .12s, border-color .12s;
    }
    .chip input { display: none; }
    .chip.selected { background: var(--accent-subtle); border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
<div class="app-shell">

  <header class="topbar">
    <div>
      <span class="logo-text">geu<span class="s">s</span>e</span>
    </div>
    <div class="step-dots" aria-label="Step 2 of 5">
      <div class="step-dot"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
    <div class="topbar-right">
      <span class="step-label">Step 2 of 5</span>
      <button class="theme-toggle" onclick="api.navigate('progress')" aria-label="Progress" title="Progress"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></button>
      <button class="theme-toggle" onclick="api.navigate('settings')" aria-label="Settings" title="Settings"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle light / dark"></button>
    </div>
  </header>

  <div class="page">
    <nav class="nav">
      <span>Geuse</span><span class="sep">›</span><span class="active">Profile</span>
    </nav>

    <h1>Your Profile</h1>
    <p class="muted mt-1">Tell us a little about yourself so we can tailor your programme.</p>

    <form id="profileForm" class="mt-4">
      <div class="card">
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="e.g. Alex Johnson" required />
        </div>

        <div class="field">
          <label for="age">Age</label>
          <input type="number" id="age" min="5" max="120" placeholder="e.g. 42" required />
        </div>

        <div class="field">
          <label for="affected_hand">Affected Hand</label>
          <select id="affected_hand">
            <option value="right">Right</option>
            <option value="left">Left</option>
            <option value="both">Both</option>
          </select>
        </div>

        <div class="field">
          <label>Rehabilitation Goals</label>
          <div class="checkbox-group" id="goals">
            <label class="chip" data-value="grip_strength">
              <input type="checkbox" value="grip_strength" /> Grip Strength
            </label>
            <label class="chip" data-value="rom">
              <input type="checkbox" value="rom" /> Range of Motion
            </label>
            <label class="chip" data-value="dexterity">
              <input type="checkbox" value="dexterity" /> Dexterity
            </label>
          </div>
        </div>

        <div class="field">
          <label for="condition">Condition / Injury (optional)</label>
          <input type="text" id="condition" placeholder="e.g. post-surgery, arthritis, fracture…" />
        </div>
      </div>

      <div class="flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">Save & Continue</button>
        <button type="button" class="btn btn-ghost" onclick="api.navigate('welcome')">Back</button>
      </div>
    </form>
  </div>

</div><!-- /.app-shell -->

<script>
  /* ── Theme toggle ─────────────────────────────────────────────── */
  const html        = document.documentElement;
  const themeToggle = document.getElementById("themeToggle");

  const SUN_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <line x1="12" y1="2"  x2="12" y2="5"/>
    <line x1="12" y1="19" x2="12" y2="22"/>
    <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
    <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
    <line x1="2"  y1="12" x2="5"  y2="12"/>
    <line x1="19" y1="12" x2="22" y2="12"/>
    <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
    <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
  </svg>`;

  const MOON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>`;

  function applyTheme(theme) {
    html.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
    syncToggleIcon();
  }

  function syncToggleIcon() {
    const isDark = html.getAttribute("data-theme") === "dark";
    themeToggle.innerHTML = isDark ? SUN_SVG : MOON_SVG;
    themeToggle.title = isDark ? "Switch to light mode" : "Switch to dark mode";
  }

  applyTheme(localStorage.getItem("geuse-theme") || "light");

  themeToggle.addEventListener("click", () => {
    const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
    localStorage.setItem("geuse-theme", next);
    applyTheme(next);
  });
</script>

<script src="../js/bridge.js"></script>
<script>
  // Chip toggle
  document.querySelectorAll(".chip").forEach((chip) => {
    chip.addEventListener("click", (e) => {
      e.preventDefault();
      chip.classList.toggle("selected");
      chip.querySelector("input").checked = chip.classList.contains("selected");
    });
  });

  // Pre-fill if profile exists
  (async () => {
    const p = await api.getProfile();
    if (!p) return;
    if (p.name)          document.getElementById("name").value = p.name;
    if (p.age)           document.getElementById("age").value  = p.age;
    if (p.affected_hand) document.getElementById("affected_hand").value = p.affected_hand;
    if (p.condition)     document.getElementById("condition").value = p.condition;
    (p.goals || []).forEach((g) => {
      const chip = document.querySelector(`.chip[data-value="${g}"]`);
      if (chip) { chip.classList.add("selected"); chip.querySelector("input").checked = true; }
    });
  })();

  document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const goals = [...document.querySelectorAll("#goals input:checked")].map((i) => i.value);
    await api.saveProfile({
      name:          document.getElementById("name").value.trim(),
      age:           parseInt(document.getElementById("age").value),
      affected_hand: document.getElementById("affected_hand").value,
      goals,
      condition:     document.getElementById("condition").value.trim(),
    });
    api.navigate("self_report");
  });
</script>
</body>
</html>
